services:
  postgres:
    image: postgres:16-alpine
    container_name: sba-msme-postgres
    environment:
      POSTGRES_DB: sba_msme_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sba_msme_portal"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sba-msme-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sba-msme-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sba_msme_portal?schema=public
      PORT: 4000
      APP_BASE_URL: http://localhost:5173
      API_BASE_URL: http://localhost:4000
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/uploads:/app/apps/api/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: sba-msme-web
    depends_on:
      - api
    env_file:
      - .env
    environment:
      VITE_APP_NAME: LMIP- Liberia MSME Intelligence Portal
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:80"

volumes:
  postgres_data:
  minio_data:
